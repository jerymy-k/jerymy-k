<svg width="900" height="220" viewBox="0 0 900 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#000000;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#050d0c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a1f1c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5eead4;stop-opacity:0" />
      <stop offset="20%" style="stop-color:#5eead4;stop-opacity:1" />
      <stop offset="80%" style="stop-color:#5eead4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5eead4;stop-opacity:0" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="textGlow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="220" fill="url(#bgGrad)" rx="12"/>

  <!-- Corner accents -->
  <line x1="0" y1="0" x2="70" y2="0" stroke="#5eead4" stroke-width="2" opacity="0.6"/>
  <line x1="0" y1="0" x2="0" y2="70" stroke="#5eead4" stroke-width="2" opacity="0.6"/>
  <line x1="900" y1="0" x2="830" y2="0" stroke="#5eead4" stroke-width="2" opacity="0.6"/>
  <line x1="900" y1="0" x2="900" y2="70" stroke="#5eead4" stroke-width="2" opacity="0.6"/>
  <line x1="0" y1="220" x2="70" y2="220" stroke="#5eead4" stroke-width="2" opacity="0.6"/>
  <line x1="0" y1="220" x2="0" y2="150" stroke="#5eead4" stroke-width="2" opacity="0.6"/>
  <line x1="900" y1="220" x2="830" y2="220" stroke="#5eead4" stroke-width="2" opacity="0.6"/>
  <line x1="900" y1="220" x2="900" y2="150" stroke="#5eead4" stroke-width="2" opacity="0.6"/>

  <!-- Subtle center glow -->
  <ellipse cx="450" cy="110" rx="300" ry="80" fill="#0d9488" opacity="0.04"/>

  <!-- Diamond sparkle left -->
  <polygon points="80,110 84,120 80,130 76,120" fill="#5eead4" opacity="0.8" filter="url(#glow)"/>
  <!-- Diamond sparkle right -->
  <polygon points="820,110 824,120 820,130 816,120" fill="#5eead4" opacity="0.8" filter="url(#glow)"/>

  <!-- Small dot accents -->
  <circle cx="110" cy="110" r="2" fill="#5eead4" opacity="0.5"/>
  <circle cx="790" cy="110" r="2" fill="#5eead4" opacity="0.5"/>

  <!-- Name -->
  <text x="450" y="98" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="42" font-weight="700" fill="#ffffff"
        text-anchor="middle" letter-spacing="4"
        filter="url(#textGlow)">Mohamed ELKERYMY</text>

  <!-- Teal divider line -->
  <rect x="200" y="110" width="500" height="1.5" fill="url(#lineGrad)" rx="1"/>

  <!-- Role -->
  <text x="450" y="140" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="14" fill="#5eead4" text-anchor="middle"
        letter-spacing="6" font-weight="400">FULL STACK DEVELOPER</text>

  <!-- Tech pills -->
  <rect x="272" y="160" width="56" height="20" rx="10" fill="#0d9488" opacity="0.2" stroke="#5eead4" stroke-width="0.5" stroke-opacity="0.4"/>
  <text x="300" y="175" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#5eead4" text-anchor="middle" letter-spacing="1">PHP</text>

  <rect x="338" y="160" width="68" height="20" rx="10" fill="#0d9488" opacity="0.2" stroke="#5eead4" stroke-width="0.5" stroke-opacity="0.4"/>
  <text x="372" y="175" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#5eead4" text-anchor="middle" letter-spacing="1">LARAVEL</text>

  <rect x="416" y="160" width="68" height="20" rx="10" fill="#0d9488" opacity="0.2" stroke="#5eead4" stroke-width="0.5" stroke-opacity="0.4"/>
  <text x="450" y="175" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#5eead4" text-anchor="middle" letter-spacing="1">MYSQL</text>

  <rect x="494" y="160" width="68" height="20" rx="10" fill="#0d9488" opacity="0.2" stroke="#5eead4" stroke-width="0.5" stroke-opacity="0.4"/>
  <text x="528" y="175" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#5eead4" text-anchor="middle" letter-spacing="1">MOROCCO</text>

  <!-- Tagline -->
  <text x="450" y="205" font-family="'Courier New', monospace"
        font-size="11" fill="#2d4a47" text-anchor="middle" letter-spacing="2">
    // Crafting elegant, scalable web solutions
  </text>

</svg>